name: Deploy to Vercel (production)

# Continuous deployment: every push to main builds and deploys to the
# (friend's) Vercel project using repo secrets. No Vercel↔GitHub app needed.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      - name: Pull Vercel project settings + env
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"
      - name: Build
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"
      - name: Deploy prebuilt to production
        run: vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
