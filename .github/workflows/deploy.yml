name: Deploy to Vercel (production)

# Continuous deployment: every push to main deploys to the (friend's) Vercel
# project using repo secrets. Uses Vercel's REMOTE build (not --prebuilt):
# the prebuilt path broke the scrypt-based auth Server Action at runtime.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      - name: Deploy to production (Vercel remote build)
        run: vercel deploy --prod --yes --token="${{ secrets.VERCEL_TOKEN }}"
